version: "3.9"

services:
  backend:

    container_name: atb_backend

    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "4800:4800"

    restart: always

  frontend:

    container_name: atb_frontend

    build:
      context: ./frontend
      dockerfile: Dockerfile

    ports:
      - "3800:80"

    restart: always

    depends_on:
      - backend